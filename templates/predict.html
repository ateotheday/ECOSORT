<!DOCTYPE html>
<html>

<head>
    <title>EcoSort - Predict</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f8fffb;
    color:#1f2937;
}

/* NAVBAR (same as home) */
.navbar{
    position:fixed;
    width:100%;
    top:0;
    display:flex;
    justify-content:space-between;
    padding:18px 60px;
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #e5e7eb;
    z-index:1000;
}

.logo{
    font-size:24px;
    font-weight:700;
    color:#16a34a;
}

.nav-links a{
    margin-left:25px;
    text-decoration:none;
    color:#374151;
    font-size:17px;
    transition:0.3s;
}

/* SIMPLE HOVER (no underline) */
.nav-links a:hover{
    color:#16a34a;
}

/* MAIN SECTION — SAME AS HERO */
.predict-container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:100px;
    text-align:center;

    /* EXACT SAME STYLE AS HOME */
    background:
    linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.95)),
    url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6');

    background-size:cover;
    background-position:center;
}

/* CARD */
.upload-card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
    text-align:center;
    max-width:500px;
    width:100%;

    animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.upload-card h2{
    margin-bottom:20px;
    color:#16a34a;
    font-size:28px;
}

/* FILE INPUT */
.file-input-wrapper{
    margin-bottom:25px;
    padding:20px;
    border:2px dashed #b7e4c7;
    border-radius:15px;
    background-color:#f7fffb;
    transition:0.3s;
}

.file-input-wrapper:hover{
    background:#ecfdf5;
}

/* BUTTON */
.btn{
    background:#16a34a;
    color:white;
    padding:14px 28px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(22,163,74,0.25);
}

/* RESULT */
.result-section{
    margin-top:30px;
    padding-top:20px;
    border-top:2px solid #f0f0f0;
}

.preview-img{
    max-width:100%;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 8px 16px rgba(0,0,0,0.1);
}

/* RESULT BADGE */
.prediction-text{
    font-size:1.3rem;
    font-weight:600;
    padding:10px 20px;
    border-radius:50px;
    display:inline-block;
}

/* Organic */
.O{
    background:#dcfce7;
    color:#166534;
    border:2px solid #16a34a;
}

/* Recyclable */
.R{
    background:#e0f2fe;
    color:#0369a1;
    border:2px solid #0284c7;
}

.back-link{
    display:block;
    margin-top:15px;
    color:#6b7280;
    text-decoration:none;
    font-size:14px;
}

.back-link:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">🌱 EcoSort</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="#">About</a>
        <a href="#">Login</a>
    </div>
</nav>

<div class="predict-container">

    <div class="upload-card">
        <h2>Waste Classification</h2>

        <form method="POST" enctype="multipart/form-data">
            <div class="file-input-wrapper">
                <input type="file" name="file" required>
            </div>

            <button type="submit" class="btn">Classify Now</button>
        </form>

        {% if prediction %}
        <div class="result-section">

            {% if filename %}
            <img src="{{ url_for('static', filename='uploads/' + filename) }}" class="preview-img">
            {% endif %}

            <div class="prediction-text {{ prediction }}">
                Result: {{ prediction }}
            </div>

            {% if confidence %}
            <div>Confidence: {{ confidence }}</div>
            {% endif %}

            <a href="/predict" class="back-link">Try another</a>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
